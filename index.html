<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>记账小系统</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <!-- 登录页面 -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-icon">💸</div>
      <h1>记账小系统</h1>
      <p class="login-subtitle">设置你的专属密码，随时随地记账</p>
      <input type="password" id="passphrase-input" placeholder="输入密码" autofocus maxlength="50">
      <button class="btn btn-primary" id="btn-login">进入</button>
      <p class="login-hint">密码就是你的钥匙，换了设备用同一密码就能看到数据</p>
    </div>
  </div>

  <!-- 主应用（登录后显示） -->
  <div id="app" class="hidden">
    <header class="app-header">
      <h1>💸 记账小系统</h1>
      <p class="subtitle">轻松记录每一笔收支</p>
    </header>
    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="record">
        <span class="tab-icon">📝</span>记账
      </button>
      <button class="tab-btn" data-tab="stats">
        <span class="tab-icon">📊</span>统计
      </button>
      <button class="tab-btn btn-logout" id="btn-logout" style="flex:0 0 auto;padding:12px 16px;border-left:1px solid rgba(255,255,255,0.2);">
        🚪
      </button>
    </nav>
    <main id="main-content"></main>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/categories.js"></script>
  <script src="js/transactions.js"></script>
  <script src="js/ui/record.js"></script>
  <script src="js/ui/stats.js"></script>
  <script src="js/ui/category-manager.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
