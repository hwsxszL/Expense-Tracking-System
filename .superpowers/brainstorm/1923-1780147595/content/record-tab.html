<h2>记账页 — 布局方案</h2>
<p class="subtitle">Tab 1：收支录入 + 流水列表</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>顶部表单 + 底部列表</h3>
      <p>上方是录入表单（紧凑横排），下方是完整的收支流水列表，支持按日期筛选和删除。</p>
      <div class="mockup">
        <div class="mockup-header">预览：布局 A</div>
        <div class="mockup-body">
          <div style="background:#f0f4ff;border-radius:8px;padding:16px;margin-bottom:12px;">
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
              <select style="padding:6px 10px;border-radius:4px;border:1px solid #ccc;"><option>支出</option><option>收入</option></select>
              <input placeholder="金额" style="padding:6px 10px;border-radius:4px;border:1px solid #ccc;width:100px;">
              <select style="padding:6px 10px;border-radius:4px;border:1px solid #ccc;"><option>餐饮</option><option>交通</option><option>购物</option></select>
              <input placeholder="备注（可选）" style="padding:6px 10px;border-radius:4px;border:1px solid #ccc;width:150px;">
              <input type="date" value="2026-05-30" style="padding:6px 10px;border-radius:4px;border:1px solid #ccc;">
              <button class="mock-button">记一笔</button>
            </div>
          </div>
          <div style="background:#fff;border:1px solid #eee;border-radius:8px;overflow:hidden;">
            <div style="display:flex;justify-content:space-between;padding:8px 12px;background:#fafafa;border-bottom:1px solid #eee;font-size:13px;color:#666;">
              <span>日期</span><span>类型</span><span>分类</span><span>金额</span><span>备注</span><span></span>
            </div>
            <div style="display:flex;justify-content:space-between;padding:10px 12px;border-bottom:1px solid #f0f0f0;font-size:13px;">
              <span>05-30</span><span style="color:#e74c3c;">支出</span><span>🍔 餐饮</span><span style="color:#e74c3c;">-35.00</span><span>午餐</span><span style="color:#999;cursor:pointer;">✕</span>
            </div>
            <div style="display:flex;justify-content:space-between;padding:10px 12px;border-bottom:1px solid #f0f0f0;font-size:13px;">
              <span>05-29</span><span style="color:#2ecc71;">收入</span><span>💰 工资</span><span style="color:#2ecc71;">+1000.00</span><span>5月</span><span style="color:#999;cursor:pointer;">✕</span>
            </div>
            <div style="display:flex;justify-content:space-between;padding:10px 12px;font-size:13px;">
              <span>05-29</span><span style="color:#e74c3c;">支出</span><span>🚇 交通</span><span style="color:#e74c3c;">-6.00</span><span>地铁</span><span style="color:#999;cursor:pointer;">✕</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>左右分栏：表单在左、列表在右</h3>
      <p>利用桌面宽屏优势，左侧固定录入区，右侧滚动流水列表。</p>
      <div class="mockup">
        <div class="mockup-header">预览：布局 B</div>
        <div class="mockup-body">
          <div style="display:flex;gap:16px;">
            <div style="flex:0 0 280px;background:#f0f4ff;border-radius:8px;padding:16px;">
              <div style="font-weight:bold;margin-bottom:12px;">记一笔</div>
              <div style="margin-bottom:8px;">
                <select style="width:100%;padding:6px 10px;border-radius:4px;border:1px solid #ccc;"><option>支出</option><option>收入</option></select>
              </div>
              <div style="margin-bottom:8px;">
                <input placeholder="金额" style="width:100%;padding:6px 10px;border-radius:4px;border:1px solid #ccc;">
              </div>
              <div style="margin-bottom:8px;">
                <select style="width:100%;padding:6px 10px;border-radius:4px;border:1px solid #ccc;"><option>餐饮</option><option>交通</option><option>购物</option></select>
              </div>
              <div style="margin-bottom:8px;">
                <input type="date" value="2026-05-30" style="width:100%;padding:6px 10px;border-radius:4px;border:1px solid #ccc;">
              </div>
              <div style="margin-bottom:8px;">
                <input placeholder="备注（可选）" style="width:100%;padding:6px 10px;border-radius:4px;border:1px solid #ccc;">
              </div>
              <button class="mock-button" style="width:100%;">记一笔</button>
            </div>
            <div style="flex:1;background:#fff;border:1px solid #eee;border-radius:8px;overflow:hidden;">
              <div style="display:flex;justify-content:space-between;padding:8px 12px;background:#fafafa;border-bottom:1px solid #eee;font-size:13px;color:#666;">
                <span>日期</span><span>类别</span><span>金额</span><span>备注</span><span></span>
              </div>
              <div style="display:flex;justify-content:space-between;padding:10px 12px;border-bottom:1px solid #f0f0f0;font-size:13px;">
                <span>05-30</span><span>🍔 餐饮</span><span style="color:#e74c3c;">-35.00</span><span>午餐</span><span style="color:#999;">✕</span>
              </div>
              <div style="display:flex;justify-content:space-between;padding:10px 12px;border-bottom:1px solid #f0f0f0;font-size:13px;">
                <span>05-29</span><span>💰 工资</span><span style="color:#2ecc71;">+1000.00</span><span>5月</span><span style="color:#999;">✕</span>
              </div>
              <div style="display:flex;justify-content:space-between;padding:10px 12px;font-size:13px;">
                <span>05-29</span><span>🚇 交通</span><span style="color:#e74c3c;">-6.00</span><span>地铁</span><span style="color:#999;">✕</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
